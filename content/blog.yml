posts:
  - slug: beyond-the-frontlines
    title: "Beyond the Frontlines: A Photographer’s Mission to Capture Military Life"
    date: "2025-09-15"
    category: Field Essay
    dek: >-
      What military photography actually does for the public record — told from
      seven years on patrol and three deployments behind the lens.
    image: >-
      https://static.wixstatic.com/media/9f2b42_a6b827b7fe604a89829034b809f7df59~mv2.jpg/v1/fit/w_1480,h_986,q_90,enc_avif,quality_auto/blog.jpg
    caption: >-
      Figure 1. Staff Sergeant Timmy Fair — U.S. Army, Operation Inherent
      Resolve, Al Asad Air Base, Iraq, 2022.
    paragraphs:
      - >-
        My journey into military photography didn’t start with a camera in hand
        — it began after seven years as a military police officer. I was all
        over the place: Louisiana, South Korea, Fort Bliss. I loved the
        structured life, but I always felt a pull to be more creative. So in
        2021 I reclassified as a multimedia illustrator.
      - >-
        After training, my new job merged with combat documentation specialists.
        I had a handle on photography from school, but most of what I learned
        came from hands-on training. During that time I took a photo that showed
        me the real purpose of the work. I needed a test shot, and Staff
        Sergeant Timmy Fair from the Michigan National Guard let me take it. In
        that moment I realized he was more than a uniform — he had a story.
      - >-
        My camera was naturally drawn to him because I was always by his side,
        in a vehicle or out on foot patrol. The moment that stands out most was
        a night on the outskirts of Al Asad Airbase. Tensions were rising
        because Iraqi service members thought our vehicles had knocked out the
        power to their post. In the pitch black, with just a few red and green
        lights on our soldiers, I had to lean on my low-light skills. SSG Fair
        held out a hand — a calm, deliberate gesture that stopped the commotion.
        He had a translator explain we hadn’t cut their power, then handed over
        a case of energy drinks as a show of good faith. We eventually traced
        the issue to corroded wires. His presence — calm, stern, deliberate —
        still resonates with me.
      - >-
        A single photo can do a lot. It helps civilians understand what military
        life actually looks like. Our work bridges the gap between service
        members and the public, putting a face to the people who serve. The role
        has a long history — from bulky Crimean and Civil War cameras shaping
        early public perception of conflict to today’s Public Affairs imagery
        providing a truthful, accurate, and timely account of operations.
      - >-
        The perks outweigh the challenges. After seven years as an MP my closest
        brush with deployment was a 2018 border surge. Within a few years as a
        combat documentation specialist I deployed to Iraq and Syria, then to
        Bahrain. The downsides — dated equipment, edit constraints — are minor
        next to the mission and the travel.
      - >-
        Want to see more of the stories military photographers tell? Visit DVIDS
        or connect with me on LinkedIn.
