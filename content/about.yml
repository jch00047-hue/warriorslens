eyebrow: About
heading: From patrol supervisor to combat camera — telling the Army’s story.
body:
  - >-
    I am Staff Sgt. Julio C. Hernandez, U.S. Army. I enlisted in March 2013 as a
    Military Police Soldier, beginning my career at Fort Polk (now Fort
    Johnson), Louisiana, in roles from assistant gunner to senior patrol officer
    and team leader.
  - >-
    I served in Korea in 2016 as a patrol and radiotelephone operator, then at
    Fort Bliss, Texas, leading patrol teams. In 2018 I mobilized to the southern
    border in support of national defense operations — the experience that
    sharpened my eye for documentation in the field.
  - >-
    In 2020 I realigned with my real passion: visual storytelling. I attended
    the Mass Communications Foundations Course and the Graphic Design Course at
    DINFOS, then joined the 55th Signal Company (Combat Camera) at Fort Meade —
    today the 55th Public Affairs Company — as a squad leader and Visual
    Information Specialist.
  - >-
    I deployed to Iraq and Syria as Combat Camera Team Lead for CJTF–Operation
    Inherent Resolve, and most recently served as Combat Camera Team Lead for
    Navy Central Command (NAVCENT) Public Affairs across joint and multinational
    operations. Now reclassified as a Public Affairs Specialist, I’m completing
    my B.S. in Integrated Marketing Communications at West Virginia University.
highlights:
  - Combat Camera Team Lead — CJTF–OIR
  - Combat Camera Team Lead — NAVCENT PA
  - 55th Public Affairs Company • Fort Meade
  - DINFOS — Mass Comm & Graphic Design
