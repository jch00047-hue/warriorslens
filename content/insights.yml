eyebrow: IMC Strategy & Campaigns
kicker: WVU — Integrated Marketing Communications
intro: >-
  Three applied IMC campaigns from coursework in WVU’s accelerated B.S.+M.S.
  program — translating audience research, brand positioning, and visual
  storytelling into deployable strategy, plus a featured field essay on what
  military photography actually does for the public record.
campaigns:
  - code: "01"
    course: JRL 433 — Integrated Marketing Communications
    title: Escape from Tarkov — IMC Launch Strategy
    objective: >-
      Develop a full-scale IMC launch strategy for Escape from Tarkov targeting
      the hardcore tactical shooter segment — military veterans, hardcore gamers
      (18–34), and tactical-sim enthusiasts.
    pillars:
      - Realism.
      - Tension.
      - Mastery.
    deliverables:
      - Market research & competitive analysis vs. Call of Duty and Arma III
      - Brand positioning as the authentic tactical experience
      - Multi-channel architecture across Twitch, YouTube, Reddit, Meta, Google
      - Unified IMC message map applied to every touchpoint
      - $500K hypothetical media plan with channel-level ROI projections
    outcome: >-
      Demonstrates the ability to translate complex audience insights into a
      cohesive brand narrative that drives both community engagement and
      conversion.
  - code: "02"
    course: JRL 432 — Marketing Research & Consumer Behavior
    title: Consumer Profile & Audience Segmentation
    objective: >-
      Build a comprehensive consumer profile and segmentation framework to
      identify high-value target markets for strategic communication planning.
    pillars:
      - Research.
      - Segment.
      - Activate.
    deliverables:
      - Primary research design — surveys and interview protocols
      - VALS-based psychographic & behavioral profiling
      - Three fully realized consumer personas
      - Consumer journey maps and segmentation matrices
      - Cross-platform media behavior analysis informing channel selection
    outcome: >-
      Demonstrates expertise in transforming raw market intelligence into
      actionable audience insights that drive targeted, resonant communication.
  - code: "03"
    course: MDIA 438 — Media Strategy & Production
    title: Media Strategy & Visual Storytelling Production
    objective: >-
      Develop and execute a comprehensive media production strategy integrating
      visual storytelling with strategic communication objectives for military
      and public-affairs audiences.
    pillars:
      - Plan.
      - Produce.
      - Distribute.
    deliverables:
      - Pre-production packages — shot lists, storyboards, schedules
      - Scripted, shot, and edited video assignments
      - Public Affairs doctrine applied to civilian media strategy
      - Platform-specific cuts — YouTube, Reels, broadcast
      - Content calendar & distribution framework end-to-end
    outcome: >-
      Bridges field-tested visual documentation — OIR, NAVCENT, and JEMX
      coverage — with academic media strategy. Military experience is a
      strategic advantage, not a backstory.
advantage:
  title: The Warrior Communicator Advantage
  body: >-
    SSG Julio C. Hernandez is not a photographer who learned marketing. He is a
    non-commissioned officer with 13 years of service — seven of them as a
    Military Police Soldier (Fort Polk, Korea, Fort Bliss) before reclassifying
    in 2021 as a Multimedia Illustrator merged into the Combat Documentation
    field. From that point on he led Combat Camera coverage downrange in Iraq
    and Syria for CJTF–Operation Inherent Resolve, then served as Lead COMCAM
    for Navy Central Command in Bahrain. Every campaign in this portfolio
    reflects a core truth: the most powerful brand stories are built on
    authentic experience, disciplined research, and mission-focused execution.
    These are skills the Army didn’t teach from a textbook — they were earned
    downrange.
  cta: >-
    Available for freelance contracts, consulting engagements, and full-time
    strategic communications roles.
