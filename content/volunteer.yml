eyebrow: Featured Project / Off-Duty
title: Creating Smiles
subtitle: A Project for Pershing Hill Elementary
meta:
  - k: PROJECT TYPE
    v: Volunteer / School Interior Rebeautification
  - k: DATE
    v: Aug — Sep 2025
  - k: LOCATION
    v: Fort George G. Meade, MD
  - k: ROLE
    v: Parent Volunteer Photographer
body:
  - >-
    As a dedicated parent volunteer, I support Pershing Hill Elementary by documenting major school ceremonies and
    events. This was a special initiative to bring fresh, vibrant visuals to the school’s interior — working directly
    with the principal over two days to photograph and edit images that replaced outdated posters and rebeautified the
    school’s halls.
  - >-
    All children featured were photographed with the explicit consent of their parents. The goal was to capture genuine
    smiles and cement those happy memories into the very halls they walk every day.
