entries:
  - year: 2024 — 2025
    role: Combat Camera Team Lead, NAVCENT PA
    org: Navy Central Command — Public Affairs
    location: Bahrain / 5th Fleet AOR
    body: >-
      Led joint Combat Camera support across Army, Navy, and Air Force PA
      elements. Documented multinational maritime operations, exercises, and
      command-level engagements throughout the Combined Maritime Forces AOR.
  - year: 2022 — 2023
    role: Combat Camera Team Lead, CJTF–OIR
    org: Combined Joint Task Force — Operation Inherent Resolve
    location: Iraq / Syria
    body: >-
      Led Combat Camera teams in support of theater-level Public Affairs themes
      and messages. Planned and executed visual documentation aligned with
      operational objectives and coalition messaging.
  - year: 2021 — 2022
    role: Squad Leader / Visual Information Specialist
    org: >-
      55th Signal Company (Combat Camera) — now 55th Public Affairs Company,
      Fort Meade
    location: Fort Meade, MD
    body: >-
      Led a Combat Camera squad and served as company Webmaster — redesigned the
      AFPIMS site, streamlined mission support, and supported JPMRC 1–22 in
      Honolulu, Hawaii. Graduated the Advanced Leadership Course as a fully
      qualified VI Specialist.
  - year: "2020"
    role: Realignment — DINFOS
    org: Defense Information School
    location: Fort Meade, MD
    body: >-
      Completed the Mass Communications Foundations Course and the Graphic
      Design Course — transitioning from law enforcement to visual
      communications and strategic messaging.
  - year: "2018"
    role: MP Mobilization — Southern Border
    org: U.S. Army Military Police
    location: U.S. Southern Border
    body: >-
      Mobilized in support of national defense operations along the southern
      border. Augmented patrol and force-protection missions — the assignment
      that sharpened my eye for documentation under pressure.
  - year: 2017 — 2019
    role: Patrol Team Leader / Supervisor (31B)
    org: U.S. Army — Fort Bliss
    location: El Paso, TX
    body: >-
      Led patrol teams and served as patrol supervisor. Conducted multiple TDY
      missions supporting law-enforcement and force-protection operations across
      CONUS.
  - year: "2016"
    role: Patrol & RTO Operator (31B)
    org: U.S. Army — Korea
    location: Republic of Korea
    body: >-
      Served as patrol and radiotelephone operator on the peninsula.
      Foundational tour in joint security operations and tactical reporting.
  - year: 2013 — 2016
    role: Military Police Soldier (31B)
    org: U.S. Army — Fort Polk (now Fort Johnson)
    location: Louisiana
    body: >-
      Enlisted March 2013. Served from assistant gunner to senior patrol officer
      and team leader — the discipline that still shapes how I work in the field
      today.
