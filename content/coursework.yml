eyebrow: Academic / WVU IMC
title: Accelerated BS+MS Coursework
subtitle: Strategy, branded content, and applied social media.
body: >-
  Selected work from my accelerated B.S.+M.S. (4+1) in Integrated Marketing Communications at West Virginia University —
  currently completing the undergraduate phase, with shared 400-level courses already feeding the graduate track. The
  portfolio spans social media strategy, branded content & narrative, applied social media, and AR/VR — with case studies
  grounded in real organizations and IPs (55th Public Affairs Company, Randy’s Army Navy, Escape from Tarkov, Rainbow Six
  Siege, Salesforce x MrBeast, IKEA Place).
