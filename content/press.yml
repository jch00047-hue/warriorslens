  - title: >-
      US, Gulf nations officials discuss regional threats and counter
      capabilities
    publication: IR-IA News
    date: "2024-02-13"
    summary: >-
      A U.S. delegation participated in U.S.-Gulf Cooperation Council (GCC)
      Working Group meetings in Saudi Arabia from February 13 to 16, led by the
      U.S. Defense Department on air and missile defense and maritime security,
      discussing threats from Iran including UAV proliferation, maritime
      aggression, cooperation with Russia, and ways to enhance regional defense
      integration.
    url: >-
      https://www.ir-ia.com/news/us-gulf-nations-officials-discuss-regional-threats-and-counter-capabilities/
  - title: Troops in Iraq, Syria had close calls with militia attacks
    publication: Military Times
    date: "2024-03-07"
    summary: >-
      U.S. Central Command's Army Gen. Erik Kurilla testified to the Senate
      Armed Services Committee that several of the 173 attacks by Iran-backed
      militias on U.S. troops in Iraq, Syria, and Jordan from October 17 to
      February 5 were close calls that could have injured or killed service
      members if not for fortunate mishaps like drones hitting other objects or
      getting caught in netting, despite most attacks causing no casualties
      except for three troops killed and nearly 200 injured in a January 28
      drone attack on Tower 22 in Jordan.
    url: >-
      https://www.militarytimes.com/news/your-military/2024/03/07/troops-in-iraq-syria-had-close-calls-with-militia-attacks/
