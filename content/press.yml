  - title: World War 3 Idaho Invades Syria
    publication: Blind Bat News
    date: "2023-02-09"
    summary: >-
      The article claims that on 26JAN2023 the Idaho-based Snake River Brigade's
      M2A2 Bradley from Charlie Company-2nd Battalion-116th Cavalry Brigade
      Combat Team, Idaho National Guard, escorted U.S./NATO units inside Syria
      under the guise of supporting the Syrian Democratic Forces (SDF) as part
      of Operation Inherent Resolve, which involved at least 108 U.S.-led
      operations in 2022, with Michigan's 1st Battalion-125th Infantry
      Regiment-37th Infantry Brigade Combat Team conducting weapons
      qualifications and other NATO members like Norway’s Telemark Mechanized
      Infantry Battalion under Task Force Viking operating in Syria's eastern
      oil/gas fields.
    url: >-
      https://www.blindbatnews.com/2023/02/world-war-3-idaho-invades-syria/104659
