  - title: US says it killed nearly 700 Islamic State suspects this year
    publication: Stars and Stripes
    date: "2022-12-30"
    summary: >-
      American military personnel, together with local forces in Iraq and Syria,
      killed nearly 700 suspected members of the Islamic State in 2022,
      officials said Thursday, highlighting an aggressive counterterrorism
      campaign that quietly endures five years after a U.S.-led coalition
      destroyed the militant group's caliphate.
    url: >-
      https://www.stripes.com/theaters/middle_east/2022-12-30/700-islamic-state-suspects-killed-8587582.html
