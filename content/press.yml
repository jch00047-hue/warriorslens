      CENTCOM says US troops weren’t injured during drone attack in Iraq,
      reversing earlier statement
    publication: Stars and Stripes
    date: "2023-04-13"
    summary: >-
      U.S. Central Command clarified that no American troops suffered traumatic
      brain injuries in a drone attack on a convoy in Sulaymaniyah, Iraq,
      attributing earlier reports of injuries to a misunderstanding, with the
      drone missing the convoy by slightly more than 100 yards.
    url: >-
      https://www.stripes.com/theaters/middle_east/2023-04-13/iraq-isis-turkey-kurdistan-9789824.html
  - title: >-
      Military experts aren’t buying militant group’s claims in fatal attack at
      US base in Syria
    publication: Stars and Stripes
    date: "2023-03-31"
    summary: >-
      Military experts doubt the claims of responsibility by the little-known
      Islamic militia Liwa al-Ghaliboun for a deadly drone attack on a U.S. base
      in Syria on March 23 that killed an American contractor and wounded
      others, suspecting Iran and its IRGC as the true perpetrators using the
      group as a front.
    url: >-
      https://www.stripes.com/theaters/middle_east/2023-03-31/syria-attack-iran-9659971.html
