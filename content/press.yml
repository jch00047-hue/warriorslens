  - title: Record US military budget prepares for “future conflict with China”
    publication: World Socialist Web Site
    date: "2022-12-10"
    summary: >-
      The US House of Representatives passed a nearly $858 billion military
      budget, $45 billion above Biden's request and 8% higher than last year,
      primarily targeting preparations for conflict with China including arming
      Taiwan with $10 billion over 10 years, while ending competitive
      contracting and repealing the COVID-19 vaccine mandate for military
      personnel.
    url: https://www.wsws.org/en/articles/2022/12/10/earp-d10.html
  - title: A look at the US military mission in Syria and its dangers
    publication: Air Force Times
    date: ""
    summary: >-
      The article examines the ongoing U.S. military presence in Syria since
      2015, focused on countering the Islamic State group and Iranian-backed
      militias, amid a recent Iranian drone strike that killed one U.S.
      contractor and wounded others, prompting U.S. retaliatory airstrikes.
    url: >-
      https://www.airforcetimes.com/news/your-military/2023/03/26/a-look-at-the-us-military-mission-in-syria-and-its-dangers/
  - title: >-
      More attacks on US positions in Syria following Biden's response to
      killing of contractor
    publication: All Arab News
    date: ""
    summary: >-
      Two U.S. military bases in eastern Syria were targeted in an apparent
      retaliatory attack following U.S. airstrikes ordered by President Biden in
      response to the killing of a U.S. contractor by an Iranian drone, with
      CENTCOM reporting no injuries or damage to U.S. or coalition forces.
    url: >-
      https://allarab.news/more-attacks-on-us-positions-in-syria-following-us-response-to-killing-of-contractor/
  - title: >-
      Washington’s security strategy in Iraq was deep-frozen. This week might
      bring an overdue thaw.
    publication: Breaking Defense
    date: ""
    summary: >-
      The article argues that the US should reassess its ongoing funding and
      strategy for Iraqi security forces under Operation Inherent Resolve (OIR)
      now that ISIS is diminished, especially ahead of this week's Joint
      Security Cooperation Dialogue (JSCD) in Washington with Iraq’s Defense
      Minister Thabet Muhammad al-Abbasi and other leaders.
    url: >-
      https://breakingdefense.com/2023/08/washingtons-security-strategy-in-iraq-was-deep-frozen-this-week-might-bring-an-overdue-thaw/?amp=1
  - title: US, Partners Find Success In Mission To Defeat Islamic State
    publication: Eurasia Review
    date: ""
    summary: >-
      U.S. Central Command conducted 313 operations in Iraq and Syria last year
      as part of the mission to defeat ISIS, with over 95% in partnership with
      Iraqi Security Forces or Syrian Democratic Forces, resulting in nearly 700
      ISIS fighters killed and 374 detained, with no U.S. service member deaths.
    url: >-
      https://www.eurasiareview.com/13012023-us-partners-find-success-in-mission-to-defeat-islamic-state/
  - title: Defending America
    publication: National Review
    date: ""
    summary: >-
      The men and women of the United States armed forces serve their country
      every day around the world, with images from deployments and training
      exercises over the past week captured by photographers serving in the
      Army, Navy, Air Force, Marine Corps, and Coast Guard.
    url: https://www.nationalreview.com/photos/defending-america-january-9-2023/
  - title: U.S. and partners kill ISIS leader in Syria raid, 4 soldiers, dog wounded
    publication: Newsweek
    date: ""
    summary: >-
      U.S. forces and Syrian Democratic Forces conducted a helicopter raid in
      northeastern Syria that killed ISIS senior leader Hamza al-Homsi but
      wounded four U.S. servicemembers and one working dog.
    url: >-
      https://www.newsweek.com/us-partners-kill-isis-leader-syria-raid-4-soldiers-dog-wounded-1782110?amp=1
  - title: 4 NJ Lawmakers Vote Against Record-High US Military Spending Bill
    publication: Patch
    date: ""
    summary: >-
      Four New Jersey lawmakers—Democrats Frank Pallone, Donald Payne Jr., and
      Bonnie Watson Coleman, and Republican Jeff Van Drew—voted against the $858
      billion National Defense Authorization Act (NDAA) for fiscal year 2023,
      which passed the U.S. House 350-80 and authorizes record-high military
      spending including funds for new weapons, a 4.6% troop pay increase, aid
      to Ukraine and Taiwan, and rollback of the COVID-19 vaccine mandate.
    url: >-
      https://patch.com/new-jersey/newarknj/4-nj-lawmakers-vote-against-record-high-us-military-spending-bill
  - title: >-
      20 years after invading Iraq, US troops are still holding things together
      there
    publication: Task & Purpose
    date: ""
    summary: >-
      The article discusses the ongoing U.S. military presence in Iraq nearly 20
      years after the 2003 invasion, highlighting partnered operations with
      Iraqi Security Forces against ISIS, progress in ISF capabilities, and
      statements from CENTCOM commanders on continued support.
    url: https://taskandpurpose.com/news/us-troops-iraq-war-anniversary/?amp
  - title: >-
      Armed Russian ground attack aircraft are increasingly buzzing US troops in
      Syria
    publication: Task & Purpose
    date: ""
    summary: >-
      The head of U.S. Central Command, Gen. Michael ‘Eric’ Kurilla, testified
      that the Russian military has increased unsafe and unprofessional behavior
      in Syria, particularly buzzing U.S. bases with armed ground attack
      aircraft since about March 1.
    url: >-
      https://taskandpurpose.com/news/russian-air-force-buzzing-us-troops-syria/?amp
  - title: "Opinion: Confidence in the military erodes as culture wars rage"
    publication: Task & Purpose
    date: ""
    summary: >-
      The article discusses the erosion of public confidence in the US military
      due to politicization from both the political left and right, exemplified
      by criticisms of General Mark Milley and factors like 'woke' practices,
      with data from the Ronald Reagan Institute study showing confidence
      dropping from 70% five years ago to 48% currently.
    url: https://taskandpurpose.com/opinion/military-confidence-culture-wars/?amp
  - title: >-
      US Military Provides January Recap on Counter-ISIS Operations in Iraq and
      Syria
    publication: The Atlas News
    date: ""
    summary: ""
    url: >-
      https://theatlasnews.co/conflict/2023/02/04/us-military-provides-january-recap-on-counter-isis-operations-in-iraq-and-syria/
  - title: U.S. Troop Drawdown In Syria Officially Announced By Pentagon
    publication: The War Zone
    date: ""
    summary: >-
      The Pentagon announced plans to consolidate military bases in Syria and
      reduce U.S. troop numbers to fewer than 1,000 personnel in the upcoming
      months due to success in combating ISIS.
    url: >-
      https://www.twz.com/news-features/u-s-troop-drawdown-in-syria-officially-announced-by-pentagon
  - title: Another U.S. Troop Injured After Follow-On Iranian-Backed Militia Attacks
    publication: The War Zone
    date: ""
    summary: >-
      Iranian-backed militias in Syria carried out two attacks on U.S. forces
      about 45 minutes apart on Friday, with the first involving multiple
      rockets at Mission Support Center Site Conoco that injured one U.S.
      service member in stable condition, and the second involving three one-way
      drones at Green Village where two were shot down and one damaged a
      building with no injuries.
    url: >-
      https://www.thedrive.com/the-war-zone/another-u-s-troop-injured-after-follow-on-iranian-backed-militia-attacks
  - title: Kataib Hezbollah's Role in the August 15 al-Tanf Attack
    publication: Washington Institute
    date: ""
    summary: >-
      The article details Kataib Hezbollah's role in launching two
      Iranian-provided KAS-04 explosive drones from Iraq's Babil province,
      specifically the Jurf al-Sakhar complex, against the U.S. base at al-Tanf,
      Syria, on August 15.
    url: >-
      https://www.washingtoninstitute.org/policy-analysis/kataib-hezbollahs-role-august-15-al-tanf-attack
  - title: "EKTAKTO: Εντός της εβδομάδας φεύγει αίτημα για τα 300 Bradley M2A2 ODS-SA!"
    publication: Πτήση Διάστημα
    date: ""
    summary: >-
      Η Ελλάδα ετοιμάζεται να αποστείλει εντός της εβδομάδας Letter of Request
      (LOR) προς τις ΗΠΑ για την απόκτηση 300 διαθέσιμων Bradley M2A2 ODS-SA,
      μετά από επιτυχή διαπραγματεύσεις του ΑΓΕΕΘΑ, καλύπτοντας πιεστική ανάγκη
