      Pentagon Announces Syria Force Consolidation Under Operation Inherent
      Resolve
    publication: Homeland Security Today
    date: "2025-04-18"
    summary: >-
      The Pentagon announced the consolidation of U.S. forces in Syria under
      Combined Joint Task Force – Operation Inherent Resolve to select
      locations, reducing the footprint to less than a thousand U.S. forces in
      the coming months following ISIS's 2019 territorial defeat.
    url: >-
      https://www.hstoday.us/subject-matter-areas/counterterrorism/pentagon-announces-syria-force-consolidation-under-operation-inherent-resolve/
