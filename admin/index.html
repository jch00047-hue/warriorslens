<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Warrior’s Lens — Mission Editor</title>
    <link rel="icon" href="data:," />
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; }
      body {
        background: #0a0a0a;
        color: #e9e3d6;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .boot {
        padding: 24px;
        line-height: 1.55;
        max-width: 720px;
        margin: 0 auto;
      }
      .boot h1 { font-weight: 600; letter-spacing: 0.04em; }
      .boot code { background: #1a1a1a; padding: 2px 6px; border-radius: 3px; }
      .boot a { color: #c9a961; }

      /*
       * ── Sveltia/Decap login screen branding ───────────────────────────
       * Until the CMS app boots, our masthead stands in for the empty
       * white default. Once Sveltia mounts in #nc-root, .wl-masthead is
       * hidden so the editor takes the full viewport.
       */
      .wl-masthead {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse at top, rgba(201,169,97,0.06), transparent 55%),
          #0a0a0a;
        z-index: 0;
        text-align: center;
        padding: 32px;
        pointer-events: none;
      }
      .wl-masthead .lockup {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .wl-mark {
        position: relative;
        width: 78px;
        height: 78px;
        display: grid;
        place-items: center;
        border: 1px solid #c9a961;
      }
      .wl-mark::after {
        content: "";
        position: absolute;
        inset: 6px;
        border: 1px solid rgba(201,169,97,0.4);
      }
      .wl-mark span {
        font-family: "Cormorant Garamond", "Playfair Display", Georgia, serif;
        font-size: 28px;
        line-height: 1;
        color: #c9a961;
        letter-spacing: 0.04em;
      }
      .wl-title {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 28px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #f1ecdf;
      }
      .wl-sub {
        font-family: ui-monospace, "JetBrains Mono", "SFMono-Regular", monospace;
        font-size: 10px;
        letter-spacing: 0.4em;
        color: #c9a961;
        text-transform: uppercase;
      }
      .wl-foot {
        margin-top: 28px;
        font-family: ui-monospace, monospace;
        font-size: 10px;
        letter-spacing: 0.3em;
        color: #5a5446;
        text-transform: uppercase;
      }

      /* When Sveltia has rendered something into #nc-root, hide our masthead. */
      #nc-root:not(:empty) ~ .wl-masthead { display: none; }

      /*
       * Tone Sveltia's surfaces toward the WL palette. Sveltia uses CSS
       * custom properties, so a few overrides land cleanly without
       * fighting their internal styles. These are best-effort accents —
       * if Sveltia changes its variable names, the editor still works,
       * just without our gold accents.
       */
      :root {
        --sui-primary-accent-color-foreground: #0a0a0a;
        --sui-primary-accent-color-background: #c9a961;
        --sui-primary-accent-color-background-hover: #d8b86b;
        --sui-link-color: #c9a961;
        --sui-focus-ring-color: #c9a961;
        --sui-control-border-color-focused: #c9a961;
        --sui-selected-background-color: rgba(201,169,97,0.15);
        --sui-error-color: #d97a3a;
      }
    </style>
  </head>
  <body>
    <div id="nc-root"></div>

    <div class="wl-masthead" aria-hidden="true">
      <div class="lockup">
        <div class="wl-mark"><span>WL</span></div>
        <div class="wl-title">Warrior&rsquo;s Lens</div>
        <div class="wl-sub">Mission Editor</div>
        <div class="wl-foot">Authenticate to deploy &middot; GitHub PAT</div>
      </div>
    </div>

    <noscript>
      <div class="boot">
        <h1>Warrior&rsquo;s Lens — Mission Editor</h1>
        <p>The admin requires JavaScript. Enable it and reload.</p>
      </div>
    </noscript>

    <!-- Sveltia CMS (Decap-compatible). Pinned to a known-good major version. -->
    <script type="module" src="https://unpkg.com/@sveltia/cms@0/dist/sveltia-cms.js"></script>
  </body>
</html>
