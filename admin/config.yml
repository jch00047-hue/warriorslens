# ─────────────────────────────────────────────────────────────────
#  Warrior's Lens — CMS configuration (Sveltia / Decap compatible)
#  Live admin: https://jch00047-hue.github.io/warriorslens/admin/
#
#  Authentication
#  ──────────────
#  Sign in with a GitHub Personal Access Token (PAT). To generate one:
#    1) GitHub → Settings → Developer settings → Personal access tokens
#       → Fine-grained tokens (recommended).
#    2) Repo access: Only select repositories → jch00047-hue/warriorslens.
#    3) Permissions (fine-grained):
#         • Contents: Read and write
#         • Metadata: Read
#    4) Generate, copy the token (starts with `github_pat_…`),
#       paste it on the CMS sign-in screen ("Sign In Using Access Token").
#       The token lives only in your browser's local storage.
#
#  Editing flow
#  ────────────
#  Saves commit YAML to `public/content/*.yml` on the `main` branch.
#  GitHub Pages rebuilds within ~1 minute, then the site loads the new
#  content from /content/*.yml at runtime.
#
#  Image uploads
#  ─────────────
#  Any "Image" field opens an upload widget. Pick a file from your computer
#  and the CMS commits it to `public/uploads/` and writes the URL into the
#  field. URL on the live site is `/warriorslens/uploads/<filename>`.
# ─────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: jch00047-hue/warriorslens
  branch: main
  commit_messages:
    create: "CMS: create {{collection}} `{{slug}}`"
    update: "CMS: update {{collection}} `{{slug}}`"
    delete: "CMS: delete {{collection}} `{{slug}}`"
    uploadMedia: "CMS: upload `{{path}}`"
    deleteMedia: "CMS: delete `{{path}}`"

# Where uploaded images are stored in the repo, and how the site references them.
media_folder: "public/uploads"
public_folder: "/warriorslens/uploads"

site_url: "https://jch00047-hue.github.io/warriorslens/"
display_url: "https://jch00047-hue.github.io/warriorslens/"
logo_url: "https://jch00047-hue.github.io/warriorslens/assets/wl-logo.svg"

# Disable editorial workflow — Julio is sole editor. Saves go straight to main.
publish_mode: simple

collections:
  # ───────────────────────────── Site identity ─────────────────────────────
  - name: site
    label: "Site identity"
    label_singular: "Site identity"
    description: >-
      Brand name, your name and rank, role/title, contact email, location,
      and external links shown in the header, footer, and contact section.
    delete: false
    files:
      - name: site
        label: "Identity, contact, socials"
        file: "public/content/site.yml"
        description: >-
          The single source of truth for your name, rank, branch, role,
          location, email, and social/external profile links.
        fields:
          - { name: brand,    label: "Brand name",         widget: string, hint: "Shown in header lockup, footer, and tab title. Always with apostrophe: Warrior's Lens." }
          - { name: owner,    label: "Owner full name",    widget: string, hint: "e.g. Julio C. Hernandez" }
          - { name: rank,     label: "Rank",               widget: string, hint: "e.g. SSG" }
          - { name: branch,   label: "Branch of service",  widget: string, hint: "e.g. U.S. Army" }
          - { name: role,     label: "Role / title",       widget: string, hint: "Public-facing tagline role, e.g. \"Combat Photographer & Public Affairs Specialist\"." }
          - { name: tagline,  label: "Site tagline",       widget: string, hint: "Short single-sentence positioning line shown beneath the role." }
          - { name: location, label: "Duty location",      widget: string, hint: "e.g. \"Fort Meade, MD — 55th Public Affairs Company\"" }
          - { name: email,    label: "Email — personal",   widget: string, hint: "Primary contact address used in the contact section." }
          - { name: emailMil, label: "Email — .mil",       widget: string, required: false, hint: "Optional military address. Leave blank to hide." }
          - { name: linkedin, label: "LinkedIn URL",       widget: string, hint: "Full URL, e.g. https://www.linkedin.com/in/julio-hernandez/" }
          - { name: dvids,    label: "DVIDS portfolio URL", widget: string, hint: "Your DVIDS portfolio link." }
          - { name: formspreeEndpoint, label: "Formspree endpoint URL", widget: string, required: false, pattern: ['^(https://formspree\.io/f/[A-Za-z0-9]+)?$', 'Must be a Formspree URL like https://formspree.io/f/abcd1234, or leave blank.'], hint: "Optional. Sign up at formspree.io, create a form, and paste your endpoint here. Leaving blank falls back to mailto." }
          - { name: subscribeEndpoint, label: "Blog subscribe endpoint URL", widget: string, required: false, pattern: ['^(https://formspree\.io/f/[A-Za-z0-9]+)?$', 'Must be a Formspree URL like https://formspree.io/f/abcd1234, or leave blank.'], hint: "Optional. Create a SECOND Formspree form for blog subscribers and paste its endpoint here. Leaving blank falls back to mailto so subscribers email you directly." }

  # ───────────────────────────── About section ─────────────────────────────
  - name: about
    label: "About section"
    label_singular: "About"
    description: >-
      Body copy that appears in the About section under the hero — the
      eyebrow, heading, paragraphs, and the highlight chips.
    delete: false
    files:
      - name: about
        label: "About copy"
        file: "public/content/about.yml"
        description: >-
          The narrative paragraphs and highlight chips shown in the About
          section. Add or remove paragraphs as your bio evolves.
        fields:
          - { name: eyebrow, label: "Eyebrow (small label)", widget: string, hint: "Tiny uppercase label above the heading, e.g. \"Operator Profile\"." }
          - { name: heading, label: "Section heading",       widget: string, hint: "Large display heading shown in the About section." }
          - name: body
            label: "Paragraphs"
            widget: list
            summary: "{{fields.paragraph | truncate(60)}}"
            hint: "Each item is one paragraph in the body of the About section."
            field: { name: paragraph, label: "Paragraph", widget: text }
          - name: highlights
            label: "Highlight chips"
            widget: list
            summary: "{{fields.highlight}}"
            hint: "Short standout phrases (e.g. \"13+ years service\") rendered as bordered chips."
            field: { name: highlight, label: "Highlight", widget: string }

  # ───────────────────────────── Hero stats ────────────────────────────────
  - name: hero_stats
    label: "Hero stats"
    label_singular: "Hero stats"
    description: >-
      The numeric stats shown directly under the hero headline (e.g.
      "13+ years service", "483 published photos"). Aim for 3 to 4 entries.
    delete: false
    files:
      - name: hero_stats
        label: "Stats shown under the hero"
        file: "public/content/hero-stats.yml"
        fields:
          - name: stats
            label: "Stats"
            widget: list
            min: 1
            max: 6
            summary: "{{fields.value}} — {{fields.label}}"
            fields:
              - { name: value, label: "Value", widget: string, hint: "Big number or short token, e.g. 13+, 483, Multi" }
              - { name: label, label: "Label", widget: string, hint: "Caption beneath the value, e.g. \"Years of service\"." }

  # ───────────────────────────── Experience ────────────────────────────────
  - name: experience
    label: "Experience timeline"
    label_singular: "Assignment"
    description: >-
      The Experience section's career timeline. List newest assignment first.
      Each entry becomes one row in the timeline.
    delete: false
    files:
      - name: experience
        label: "Assignments"
        file: "public/content/experience.yml"
        fields:
          - name: entries
            label: "Entries (newest first)"
            widget: list
            summary: "{{fields.year}} · {{fields.role}} — {{fields.org}}"
            fields:
              - { name: year,     label: "Year(s)",      widget: string, hint: "e.g. \"2024 — 2025\" or \"2018\"." }
              - { name: role,     label: "Role / title", widget: string, hint: "Your duty title at this assignment, e.g. \"Lead Combat Camera, NAVCENT\"." }
              - { name: org,      label: "Org / unit",   widget: string, hint: "Unit or organization, e.g. \"55th Public Affairs Company\"." }
              - { name: location, label: "Location",     widget: string, hint: "Geographic location, e.g. \"Fort Meade, MD\" or \"Bahrain\"." }
              - { name: body,     label: "Description",  widget: text,   hint: "1-3 sentences describing scope, missions, and impact." }

  # ───────────────────────────── Press & coverage ──────────────────────────
  - name: press
    label: "Press & coverage"
    label_singular: "Press article"
    description: >-
      External articles, mentions, or syndications that reference your work.
      Newest first. Each entry becomes a card in the Press section.
    delete: false
    files:
      - name: press
        label: "Articles"
        file: "public/content/press.yml"
        fields:
          - name: items
            label: "Press items"
            widget: list
            summary: "{{fields.publication}} — {{fields.title}}"
            fields:
              - { name: title,       label: "Article title",  widget: string, hint: "Headline of the article." }
              - { name: publication, label: "Publication",    widget: string, hint: "Outlet name, e.g. \"DVIDS\" or \"Stars and Stripes\"." }
              - { name: date,        label: "Date",           widget: string, required: false, pattern: ['^([0-9]{4}(-[0-9]{2}(-[0-9]{2})?)?)?$', 'Use YYYY, YYYY-MM, or YYYY-MM-DD (or leave blank).'], hint: "Format: YYYY-MM or YYYY-MM-DD. Leave blank if unknown." }
              - { name: summary,     label: "Summary",        widget: text,   hint: "1-2 sentence description of the article." }
              - { name: url,         label: "Article URL",    widget: string, hint: "Full link to the published article." }

  # ───────────────────────────── Insights (IMC strategy) ───────────────────
  - name: insights
    label: "Insights — IMC strategy"
    label_singular: "Insights"
    description: >-
      The applied IMC campaign work shown in the Insights section, plus the
      "Warrior Communicator Advantage" positioning statement at the bottom.
      Course work is from WVU's accelerated B.S.+M.S. (4+1) IMC program.
    delete: false
    files:
      - name: insights
        label: "Strategy block"
        file: "public/content/insights.yml"
        description: >-
          Section intro copy, the three campaign cards, and the closing
          positioning statement. Reorder or replace campaigns as new
          coursework is completed.
        fields:
          - { name: eyebrow, label: "Section eyebrow", widget: string, required: false, hint: "Small tag above the heading. Default: \"IMC Strategy & Campaigns\"." }
          - { name: kicker,  label: "Kicker badge",    widget: string, hint: "Short bordered badge to the right of the heading, e.g. \"WVU — Integrated Marketing Communications\"." }
          - { name: intro,   label: "Section intro",   widget: text,   hint: "1-3 sentence overview shown next to the heading." }

          - name: campaigns
            label: "Campaign cards"
            widget: list
            summary: "{{fields.code}} · {{fields.title}}"
            min: 1
            max: 6
            hint: "Each item renders as one of the three side-by-side campaign cards."
            fields:
              - { name: code,      label: "Code",          widget: string, hint: "Short code shown on the card, e.g. \"01\", \"02\", \"03\"." }
              - { name: course,    label: "Course",        widget: string, hint: "e.g. \"JRL 433 — Integrated Marketing Communications\"." }
              - { name: title,     label: "Campaign title", widget: string }
              - { name: objective, label: "Objective",     widget: text,   hint: "1-2 sentence description of what the campaign sets out to do." }
              - name: pillars
                label: "Strategic pillars"
                widget: list
                hint: "Short single-word pillars rendered as chips, e.g. \"Realism.\", \"Tension.\", \"Mastery.\". Aim for 3."
                summary: "{{fields.pillar}}"
                field: { name: pillar, label: "Pillar", widget: string }
              - name: deliverables
                label: "Key deliverables"
                widget: list
                hint: "Bulleted list of what the campaign produces (3-6 items)."
                summary: "{{fields.deliverable | truncate(60)}}"
                field: { name: deliverable, label: "Deliverable", widget: string }
              - { name: outcome, label: "Strategic outcome", widget: text, hint: "Closing italic line on the card describing the takeaway." }

          - name: advantage
            label: "Warrior Communicator Advantage"
            widget: object
            hint: "The closing positioning statement under the campaign cards."
            fields:
              - { name: title, label: "Title",      widget: string, hint: "Display heading. The first two words render in white, the rest in italic gold." }
              - { name: body,  label: "Body",       widget: text,   hint: "1-2 paragraph statement on what makes your background distinctive." }
              - { name: cta,   label: "Call to action", widget: text, hint: "Closing line in gold, e.g. availability for freelance / consulting / full-time." }

  # ───────────────────────────── Capabilities ──────────────────────────────
  - name: capabilities
    label: "Capabilities"
    label_singular: "Capability"
    description: >-
      The four service offerings shown in the Capabilities section. Each card
      displays a code, a service title, a 1-2 sentence description, and a
      bulleted list of representative deliverables.
    delete: false
    files:
      - name: capabilities
        label: "Capability cards"
        file: "public/content/capabilities.yml"
        fields:
          - name: items
            label: "Cards"
            widget: list
            min: 1
            max: 6
            summary: "{{fields.code}} \u00b7 {{fields.title}}"
            fields:
              - { name: code,  label: "Code",  widget: string, hint: "Short ordinal, e.g. 01." }
              - { name: title, label: "Title", widget: string }
              - { name: desc,  label: "Description", widget: text, hint: "1-2 sentence summary of the offering." }
              - name: items
                label: "Bulleted deliverables"
                widget: list
                summary: "{{fields.deliverable}}"
                hint: "3-5 short bullet items rendered under the card."
                field: { name: deliverable, label: "Deliverable", widget: string }

  # ───────────────────────────── Volunteer (Pershing Hill) ─────────────────
  - name: volunteer
    label: "Volunteer project"
    label_singular: "Volunteer"
    description: >-
      The Pershing Hill Elementary volunteer feature \u2014 masthead copy,
      project metadata, the hero image, and the gallery grid.
    delete: false
    files:
      - name: volunteer
        label: "Pershing Hill volunteer feature"
        file: "public/content/volunteer.yml"
        fields:
          - { name: eyebrow,  label: "Eyebrow",  widget: string, hint: "Tiny uppercase label, e.g. \"Featured Project / Off-Duty\"." }
          - { name: title,    label: "Title",    widget: string }
          - { name: subtitle, label: "Subtitle", widget: string }
          - name: meta
            label: "Meta strip"
            widget: list
            hint: "Compact key/value pairs shown in the meta strip (PROJECT TYPE, DATE, LOCATION, ROLE)."
            summary: "{{fields.k}}: {{fields.v}}"
            fields:
              - { name: k, label: "Label", widget: string }
              - { name: v, label: "Value", widget: string }
          - name: body
            label: "Body paragraphs"
            widget: list
            summary: "{{fields.paragraph | truncate(60)}}"
            hint: "One item per paragraph."
            field: { name: paragraph, label: "Paragraph", widget: text }
          - { name: hero, label: "Hero image", widget: image, hint: "Wide masthead photo for the section." }
          - name: images
            label: "Gallery images"
            widget: list
            summary: "{{fields.src}}"
            hint: "Each item is one photo in the gallery grid. Upload a file or paste a URL."
            field: { name: src, label: "Image", widget: image }

  # ───────────────────────────── Coursework (BS+MS accelerated) ────────────────
  - name: coursework
    label: "Coursework (BS+MS accelerated)"
    label_singular: "Course item"
    description: >-
      Selected work from WVU's accelerated B.S.+M.S. (4+1) IMC program shown in
      the Coursework section — currently completing the undergraduate phase.
      Filterable list of deliverables linked to course PDFs/PPTX.
    delete: false
    files:
      - name: coursework
        label: "BS+MS coursework"
        file: "public/content/coursework.yml"
        fields:
          - { name: eyebrow,  label: "Section eyebrow", widget: string, required: false }
          - { name: title,    label: "Section title",   widget: string }
          - { name: subtitle, label: "Section subtitle", widget: string, required: false }
          - { name: body,     label: "Section intro",   widget: text,   required: false }
          - name: courses
            label: "Courses (header strip)"
            widget: list
            summary: "{{fields.code}} \u00b7 {{fields.title}}"
            hint: "Courses listed at the top of the section."
            fields:
              - { name: code,       label: "Course code", widget: string }
              - { name: title,      label: "Course title", widget: string }
              - { name: instructor, label: "Instructor",   widget: string, required: false }
          - name: filters
            label: "Filter chips"
            widget: list
            hint: "Filter chip labels shown above the items grid. \"All\" should be the first entry."
            summary: "{{fields.filter}}"
            field: { name: filter, label: "Filter", widget: string }
          - name: items
            label: "Items"
            widget: list
            summary: "{{fields.course}} \u00b7 {{fields.title}}"
            fields:
              - { name: id,      label: "ID",       widget: string, hint: "Stable React key, e.g. \"jrl432-u12\"." }
              - { name: tag,     label: "Tag",      widget: string, hint: "Filter tag, e.g. \"Strategy\", \"Branded Content\", \"Social Media\", \"AR / VR\", \"Extra Credit\"." }
              - { name: course,  label: "Course",   widget: string }
              - { name: unit,    label: "Unit",     widget: string }
              - { name: title,   label: "Title",    widget: string }
              - { name: summary, label: "Summary",  widget: text }
              - { name: file,    label: "File path", widget: string, hint: "Path under public/, e.g. \"files/JRL432_Unit12_55thPAC-SocialStrategy.docx\"." }
              - { name: year,    label: "Year",     widget: string, required: false }

  # ───────────────────────────── Per-post blog folder ──────────────────────
  # Newer per-post collection. Files written here are loaded alongside
  # public/content/blog.yml so legacy entries keep working.
  - name: posts
    label: "Field Notes (per-post)"
    label_singular: "Essay (per-post)"
    description: >-
      Newer essays as one YAML file per post under public/content/posts/.
      Use this collection going forward; the old single-file blog stays
      readable for the existing two posts.
    folder: "public/content/posts"
    create: true
    delete: true
    extension: yml
    format: yml
    slug: "{{slug}}"
    summary: "{{date}} \u00b7 {{title}}"
    fields:
      - { name: slug,     label: "Slug",         widget: string, pattern: ['^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$', 'Lowercase letters, numbers, and hyphens only.'] }
      - { name: title,    label: "Title",        widget: string }
      - { name: date,     label: "Date",         widget: string, pattern: ['^[0-9]{4}-[0-9]{2}-[0-9]{2}$', 'Date must be YYYY-MM-DD.'] }
      - { name: category, label: "Category",     widget: string }
      - { name: dek,      label: "Dek (subtitle)", widget: text }
      - { name: image,    label: "Header image", widget: image, required: false }
      - { name: caption,  label: "Image caption", widget: string, required: false }
      - name: paragraphs
        label: "Body paragraphs"
        widget: list
        summary: "{{fields.paragraph | truncate(80)}}"
        field: { name: paragraph, label: "Paragraph", widget: text }
      - name: references
        label: "References (optional)"
        widget: list
        required: false
        summary: "{{fields.text | truncate(60)}}"
        fields:
          - { name: text, label: "Citation", widget: string }
          - { name: url,  label: "URL",      widget: string }

  # ───────────────────────────── Field Notes (blog) ────────────────────────
  - name: blog
    label: "Field Notes (Blog)"
    label_singular: "Essay"
    description: >-
      Long-form essays shown in the Field Notes section. The first post is
      featured at the top; the rest render as a grid of cards. Add a new
      essay any time and it appears on the live site within ~1 minute.
    delete: false
    files:
      - name: blog
        label: "Posts"
        file: "public/content/blog.yml"
        description: >-
          One entry per essay. Newest first — the top entry becomes the
          featured hero. Each post supports a header image (uploaded via the
          image picker), category, date, dek (subtitle), body paragraphs,
          and optional academic-style references.
        fields:
          - name: posts
            label: "Posts (newest first)"
            widget: list
            summary: "{{fields.date}} · {{fields.title}}"
            min: 0
            fields:
              - { name: slug,     label: "Slug",         widget: string, pattern: ['^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?$', 'Lowercase letters, numbers, and hyphens only.'], hint: "URL-safe identifier used as the React key. Lowercase, hyphenated, e.g. \"beyond-the-frontlines\". Keep stable so links don't break." }
              - { name: title,    label: "Title",        widget: string }
              - { name: date,     label: "Date",         widget: string, pattern: ['^[0-9]{4}-[0-9]{2}-[0-9]{2}$', 'Date must be YYYY-MM-DD (e.g. 2025-09-15).'], hint: "Format: YYYY-MM-DD (e.g. 2025-09-15). Used to sort and display." }
              - { name: category, label: "Category",     widget: string, hint: "Short label rendered as a tag, e.g. \"Field Essay\", \"Doctrine\", \"Craft Note\"." }
              - { name: dek,      label: "Dek (subtitle)", widget: text,  hint: "1-2 sentence sub-headline shown under the title and on cards." }
              - { name: image,    label: "Header image", widget: image, required: false, hint: "Upload a 3:2 (landscape) image. Used as the post's hero image and card thumbnail." }
              - { name: caption,  label: "Image caption", widget: string, required: false, hint: "Photo cutline shown below the header image (place, person, date)." }
              - name: paragraphs
                label: "Body paragraphs"
                widget: list
                summary: "{{fields.paragraph | truncate(80)}}"
                hint: "One item per paragraph. Plain text — no markdown needed."
                field: { name: paragraph, label: "Paragraph", widget: text }
              - name: references
                label: "References (optional)"
                widget: list
                required: false
                summary: "{{fields.text | truncate(60)}}"
                hint: "Academic-style citations rendered at the end of the essay. Leave empty if not needed."
                fields:
                  - { name: text, label: "Citation text", widget: string, hint: "Full citation, e.g. \"Smith, J. (2024). Title. Outlet.\"" }
                  - { name: url,  label: "URL",           widget: string, hint: "Link to the source." }

  # ───────────────────────────── Media library ─────────────────────────────
  # Sveltia auto-shows a Media tab; this entry adds a documentation hint.
  # Uploaded files land in public/uploads/ and are served at
  # https://jch00047-hue.github.io/warriorslens/uploads/<filename>.
